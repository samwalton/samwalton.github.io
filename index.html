<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">

  <title>Sam Walton - A Man</title>
  <meta name="description" content="A simple landing page.">
  <meta name="author" content="Sam Walton">

  <style>
body {
	background: linear-gradient(270deg, #ffb300, #00c3ff);
	background-size: 400% 400%;
	text-align: center;
	-webkit-animation: AnimationName 30s ease infinite;
	-moz-animation: AnimationName 30s ease infinite;
	-o-animation: AnimationName 30s ease infinite;
	animation: AnimationName 30s ease infinite;
}

h1{
	font-family:"Calibri";
	font-size:5em;
	color:#eff5f7;
}

@-webkit-keyframes AnimationName {
  	0%{background-position:0% 50%}
	50%{background-position:100% 50%}
	100%{background-position:0% 50%}
}
@-moz-keyframes AnimationName {
	0%{background-position:0% 50%}
	50%{background-position:100% 50%}
	100%{background-position:0% 50%}
}
@-o-keyframes AnimationName {
	0%{background-position:0% 50%}
	50%{background-position:100% 50%}
	100%{background-position:0% 50%}
}
@keyframes AnimationName {
	0%{background-position:0% 50%}
	50%{background-position:100% 50%}
	100%{background-position:0% 50%}
}

.heading-wrapper{
	display:table; 
	width:100%; 
	height: 35em; 
	margin:0;
}
.heading-wrapper .heading-box{
	display:table-cell; 
	vertical-align:middle;
}
</style>

</head>
<body>
<div class="heading-wrapper">
<div class="heading-box">
<div class="inner"><h1>Sam Walton</h1></div>
</div>
</div>
</body>
</html>
